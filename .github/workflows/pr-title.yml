---
name: PR Title

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions: {}

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      # The PR title becomes the squash-merge commit subject, which feeds
      # git-cliff's conventional-commit parsing in the prerelease workflow.
      # Enforcing Conventional Commits here keeps automated version bumping
      # (git cliff --bump) and changelog generation reliable.
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        with:
          wip: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
