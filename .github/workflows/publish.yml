---
name: Publish

on:
  release:
    types: [published]

permissions: {}

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: ${{ !github.event.release.prerelease }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      # Marking a release as "latest" only updates the repository's latest-release
      # pointer (metadata); it does not modify the release's locked assets or tag,
      # so it is safe to run on immutable-release repositories after publication.
      - name: Make Release Latest
        run: |
          gh release edit "${RELEASE_TAG}" --latest
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          GH_TOKEN: ${{ github.token }}

      - name: Update Major and Minor Tags
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { default: script } = await import(`${process.env.GITHUB_WORKSPACE}/.github/scripts/major-tag-update.mjs`)
            await script({ context, github, core })
        env:
          INPUT_TAG: ${{ github.event.release.tag_name }}

      - name: Remove Release Branch
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { default: script } = await import(`${process.env.GITHUB_WORKSPACE}/.github/scripts/release-branch-remove.mjs`)
            await script({ context, github, core })
        env:
          INPUT_TAG: ${{ github.event.release.tag_name }}
          INPUT_BRANCH_PREFIX: prerelease
