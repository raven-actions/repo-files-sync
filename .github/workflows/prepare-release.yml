# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Prepare Release

# Manually-triggered workflow that opens the final-release pull request.
#
# It computes the next stable version and the FULL release notes since the last
# final release, updates CHANGELOG.md, and opens a PR titled
# `chore(release): vX.Y.Z`. Merging that PR triggers publish-release.yml, which tags the
# final release at the exact commit of the last release candidate (see the
# `prerelease/vX.Y.Z` branch). Cut at least one RC (merge to main) before running.

on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: prepare-release
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write # create the release-prep branch + verified changelog commit
      pull-requests: write # open/update the release PR
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      # Full notes since the last FINAL release (cliff.toml tag_pattern matches
      # only stable vX.Y.Z, so RC tags are ignored and the range spans the whole
      # development cycle). --bump also yields the target version.
      - name: Compute version and full release notes
        id: notes
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: .github/cliff.toml
          args: --github-repo "${{ github.repository }}" --unreleased --bump --strip header
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # The final release must reuse the latest PUBLISHED RC. A draft RC updates
      # the prerelease/<version> branch before it creates a git tag, so require
      # the branch tip to match the latest promoted vX.Y.Z-rc.N tag.
      - name: Verify a published release candidate exists
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.notes.outputs.version }}
        run: |
          latest="$(git tag --list --sort=-v:refname \
            | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          if [ -n "${latest}" ] && [ "${VERSION#v}" = "${latest#v}" ]; then
            echo "::error::Nothing to release: computed version ${VERSION} equals the latest release ${latest}."
            exit 1
          fi
          branch_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/prerelease/${VERSION}" --jq '.object.sha' 2>/dev/null || true)"
          if [ -z "${branch_sha}" ]; then
            echo "::error::No release candidate branch prerelease/${VERSION}. Merge changes to main and let an RC build first."
            exit 1
          fi
          last_n="$(git tag --list "${VERSION}-rc.*" | sed 's/.*-rc\.//' | grep -E '^[0-9]+$' | sort -n | tail -n1 || true)"
          if [ -z "${last_n}" ]; then
            echo "::error::No published release candidate tag for ${VERSION}. Publish the current draft RC before preparing the final release."
            exit 1
          fi
          rc_tag="${VERSION}-rc.${last_n}"
          rc_sha="$(git rev-list -n 1 "${rc_tag}")"
          if [ "${branch_sha}" != "${rc_sha}" ]; then
            echo "::error::prerelease/${VERSION} points at ${branch_sha}, but latest published RC ${rc_tag} points at ${rc_sha}. Publish the current draft RC before preparing the final release."
            exit 1
          fi
          echo "Published release candidate ${rc_tag} found at branch tip ${branch_sha}."

      # Regenerate the full CHANGELOG.md file (all releases + the bumped one).
      - name: Generate CHANGELOG.md
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: .github/cliff.toml
          args: --github-repo "${{ github.repository }}" --bump
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ github.token }}

      # Pin the action version in the README usage examples to the version being
      # released, so the docs rendered from the default branch always match the
      # just-published tag. Only references to THIS action are rewritten (the
      # pattern is keyed to the repo slug), and the value equals the release tag
      # exactly. git-cliff cannot edit arbitrary files, so this is a plain sed.
      - name: Pin action version in README
        env:
          VERSION: ${{ steps.notes.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          sed -i -E "s#(${REPO}@)v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?#\1${VERSION}#g" README.md
          echo "README now pins ${REPO}@${VERSION}:"
          grep -n "${REPO}@" README.md || true

      - name: Open release PR
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { default: script } = await import(`${process.env.GITHUB_WORKSPACE}/.github/scripts/release-pr-create.mjs`)
            await script({ context, github, core })
        env:
          INPUT_VERSION: ${{ steps.notes.outputs.version }}
          INPUT_NOTES: ${{ steps.notes.outputs.content }}
          INPUT_FILES: |
            CHANGELOG.md
            README.md
          INPUT_BRANCH_PREFIX: release-prep

      - name: Summary
        env:
          VERSION: ${{ steps.notes.outputs.version }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          {
            echo "## Release prepared"
            echo ""
            echo "- Version: \`${VERSION}\`"
            echo "- Release PR: ${PR_URL}"
            echo ""
            echo "Merge the PR to publish the final release at the last RC commit."
          } >> "$GITHUB_STEP_SUMMARY"
