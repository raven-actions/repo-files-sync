---
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run lint command
        run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run type check
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run build command
        run: pnpm build

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-26
          - windows-2025
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-24.04'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          # token: ${{ secrets.CODECOV_TOKEN }}
          use_oidc: true
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # Aggregates the test matrix into a single, stable status check.
  # Use this job's name ("Test Check") as the required check in repository rules
  # instead of the per-OS legs, which change whenever the matrix changes.
  test-check:
    name: Test Check
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: [test]
    if: always()
    permissions: {}
    steps:
      - name: Check test matrix result
        env:
          RESULT: ${{ needs.test.result }}
        run: |
          echo "Test matrix result: ${RESULT}"
          if [ "${RESULT}" != "success" ]; then
            echo "::error::One or more test matrix jobs did not succeed (result: ${RESULT})"
            exit 1
          fi
          echo "All test matrix jobs succeeded"
