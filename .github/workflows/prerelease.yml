# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Prerelease

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed
    branches:
      - main

permissions: {}

concurrency:
  group: prerelease-${{ github.event.workflow_run.head_branch || 'main' }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    # Skip the release commit produced by merging a `chore(release): vX.Y.Z` PR,
    # so promoting a release never cuts a spurious new RC.
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success'
      && !startsWith(github.event.workflow_run.head_commit.message, 'chore(release)') }}
    permissions:
      contents: read
      id-token: write # request the Sigstore OIDC token used to sign the attestation
      attestations: write # write the build provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Pin to the exact commit that passed CI. For workflow_run, checkout
          # otherwise defaults to the branch HEAD, which may already be ahead of
          # the tested commit, so the built dist + attestation would not match.
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run build command
        run: pnpm build

      # Generate signed SLSA build provenance for the bundled action entrypoint so
      # consumers can verify dist/index.mjs was built by this repo's CI and not
      # tampered with (gh attestation verify dist/index.mjs --repo <owner>/<repo>).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/index.mjs

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          # Short-lived hand-off to the prerelease job in the same run. Kept at a
          # few days (not 1) so a delayed re-run of that job can still find it.
          retention-days: 5

  prerelease:
    name: Prerelease
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: read # git-cliff GitHub integration enriches notes with PR data
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }} # the exact commit that passed CI
          fetch-depth: 0
          persist-credentials: false

      - name: Get release details
        id: release-details
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: .github/cliff.toml
          args: --github-repo "${{ github.repository }}" --unreleased --bump --strip header
        env:
          # Authenticated GitHub remote so the changelog template can resolve PR
          # numbers, usernames and first-time contributors (empty/rate-limited otherwise).
          GITHUB_TOKEN: ${{ github.token }}

      - name: Guard against no-op release
        id: guard
        env:
          BUMPED: ${{ steps.release-details.outputs.version }}
        run: |
          latest="$(git tag --list --sort=-v:refname \
            | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)"
          echo "Latest published semver tag: ${latest:-<none>}"
          echo "git-cliff bumped version:    ${BUMPED}"
          if [ -n "${latest}" ] && [ "${BUMPED#v}" = "${latest#v}" ]; then
            echo "No version-bumping commits since ${latest}; skipping prerelease."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Compute the proposed RC tag (vX.Y.Z-rc.N) for the target stable version.
      # N is the next number after the last *promoted* (published) RC tag, so it
      # stays constant while the draft is repeatedly overwritten and only advances
      # once a maintainer manually promotes a draft. The git-cliff range keeps the
      # draft notes to the incremental changes since the previous promoted RC (the
      # full notes are produced at final cut).
      - name: Compute RC tag
        id: rc
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.release-details.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          last_n="$(git tag --list "${VERSION}-rc.*" | sed 's/.*-rc\.//' | grep -E '^[0-9]+$' | sort -n | tail -n1 || true)"
          if [ -n "${last_n}" ]; then
            next=$((last_n + 1))
            range="${VERSION}-rc.${last_n}..HEAD"
          else
            next=1
            range=""
          fi
          rc_tag="${VERSION}-rc.${next}"
          if [ -n "${range}" ]; then
            args="--github-repo ${REPO} --tag ${rc_tag} --strip header ${range}"
          else
            args="--github-repo ${REPO} --tag ${rc_tag} --strip header --unreleased"
          fi
          echo "rc_tag=${rc_tag}" >> "$GITHUB_OUTPUT"
          echo "args=${args}" >> "$GITHUB_OUTPUT"
          echo "Next RC: ${rc_tag} (range: ${range:-since last release})"

      - name: Generate RC notes
        id: rc-notes
        if: steps.guard.outputs.skip != 'true'
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: .github/cliff.toml
          args: ${{ steps.rc.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Download build artifact
        if: steps.guard.outputs.skip != 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      # Pin the README usage examples to the RC tag (vX.Y.Z-rc.N) before the
      # curated commit is built, so the draft/prerelease documents the exact
      # version a consumer would install from it. When the final release is cut,
      # publish-release.yml re-pins the README to the stable vX.Y.Z tag, so every
      # artifact's docs match its own tag. Only refs to THIS action are rewritten.
      - name: Pin action version in README
        if: steps.guard.outputs.skip != 'true'
        env:
          RC_TAG: ${{ steps.rc.outputs.rc_tag }}
          REPO: ${{ github.repository }}
        run: |
          # Escape regex metacharacters in the repo slug before using it in the
          # sed pattern, so a slug with '.', '+', etc. is matched literally
          # (mirrors the escaping the .mjs release scripts already do).
          esc_repo="$(printf '%s' "${REPO}" | sed 's#[^A-Za-z0-9_/-]#\\&#g')"
          sed -i -E "s#(${esc_repo}@)v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?#\1${RC_TAG}#g" README.md
          echo "README now pins ${REPO}@${RC_TAG}:"
          grep -n "${REPO}@" README.md || true

      - name: Prepare Release Branch
        id: release-branch
        if: steps.guard.outputs.skip != 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { default: script } = await import(`${process.env.GITHUB_WORKSPACE}/.github/scripts/release-branch-create.mjs`)
            await script({ context, github, core })
        env:
          INPUT_TAG: ${{ steps.release-details.outputs.version }}
          INPUT_BRANCH_PREFIX: prerelease
          INPUT_BASE_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_FILES: |
            LICENSE
            README.md
            action.yml
            dist

      # A draft release never creates its git tag, so GitHub would otherwise let
      # each run pile up a brand-new draft. Delete any existing draft RC first so
      # the single pending draft is always overwritten in place. Published RCs
      # (real git tags) are never matched here and stay untouched.
      - name: Remove existing draft RC
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          ids="$(gh api --paginate "repos/${REPO}/releases" \
            --jq '.[] | select(.draft == true and (.tag_name | test("^v?[0-9]+\\.[0-9]+\\.[0-9]+-rc\\.[0-9]+$"))) | .id')"
          if [ -z "${ids}" ]; then
            echo "No existing draft release candidate to remove."
          else
            for id in ${ids}; do
              echo "Deleting existing draft release id=${id}"
              gh api --method DELETE "repos/${REPO}/releases/${id}" --silent
            done
          fi

      # Always prepare the RC as a DRAFT, via the GitHub CLI (gh is preinstalled
      # on runners - no third-party action to pin or track). Cutting a real
      # release candidate is a deliberate manual step: a maintainer reviews the
      # draft and clicks "Publish release", which creates the vX.Y.Z-rc.N tag at
      # the curated prerelease/vX.Y.Z branch tip. Until then this draft is
      # overwritten in place on every successful CI run (the step above deletes
      # the previous draft), keeping the same proposed RC number.
      - name: Create draft prerelease
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RC_TAG: ${{ steps.rc.outputs.rc_tag }}
          # Target the exact curated commit, not a moving branch name. The branch
          # remains as the in-flight carrier, but publishing this draft will create
          # the RC tag at the same reviewed commit even if main advances later.
          TARGET: ${{ steps.release-branch.outputs.sha }}
          # Passed via env (not inlined) so the notes content cannot break out of
          # the shell command; written to a file for --notes-file.
          BODY: ${{ steps.rc-notes.outputs.content }}
        run: |
          printf '%s' "${BODY}" > rc-notes.md
          gh release create "${RC_TAG}" \
            --repo "${REPO}" \
            --target "${TARGET}" \
            --title "${RC_TAG}" \
            --notes-file rc-notes.md \
            --draft \
            --prerelease
