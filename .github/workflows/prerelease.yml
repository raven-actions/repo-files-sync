---
name: Prerelease

on:
  workflow_run:
    workflows: [CI]
    types:
      - completed
    branches:
      - main

permissions: {}

concurrency:
  group: prerelease-${{ github.event.workflow_run.head_branch || 'main' }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write # request the Sigstore OIDC token used to sign the attestation
      attestations: write # write the build provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run build command
        run: pnpm build

      # Generate signed SLSA build provenance for the bundled action entrypoint so
      # consumers can verify dist/index.mjs was built by this repo's CI and not
      # tampered with (gh attestation verify dist/index.mjs --repo <owner>/<repo>).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/index.mjs

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          retention-days: 1

  prerelease:
    name: Prerelease
    needs: [build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get release details
        id: release-details
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        with:
          config: .github/cliff.toml
          args: --github-repo "${{ github.repository }}" --unreleased --bump --strip header

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Prepare Release Branch
        id: release-branch
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { default: script } = await import(`${process.env.GITHUB_WORKSPACE}/.github/scripts/release-branch-create.mjs`)
            await script({ context, github, core })
        env:
          INPUT_TAG: ${{ steps.release-details.outputs.version }}
          INPUT_BRANCH_PREFIX: prerelease
          INPUT_FILES: |
            LICENSE
            README.md
            action.yml
            dist
            .github/workflows/publish.yml

      - name: Delete existing draft prerelease
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const tag = core.getInput('TAG', { required: true })
            const { owner, repo } = context.repo
            const releases = await github.paginate(github.rest.repos.listReleases, { owner, repo })
            for (const release of releases) {
              if (release.tag_name === tag && release.draft) {
                core.info(`Deleting existing draft release ${release.id} for tag ${tag}`)
                await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id })
              }
            }
        env:
          INPUT_TAG: ${{ steps.release-details.outputs.version }}

      - name: Create Draft Prerelease
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.release-details.outputs.version }}
          name: ${{ steps.release-details.outputs.version }}
          body: ${{ steps.release-details.outputs.content }}
          draft: true
          prerelease: true
          generate_release_notes: false
          target_commitish: ${{ steps.release-branch.outputs.name }}
