# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
---
name: Publish Release

# Publishes the final release when a `chore(release): vX.Y.Z` PR (opened by the
# Prepare Release workflow) is merged into main. The final tag is created at the
# last release candidate commit, with the README usage examples re-pinned from
# the RC tag (vX.Y.Z-rc.N) to the final vX.Y.Z. Only the README changes; dist/
# (the attested action code) is carried over byte-identical from the last RC.

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions: {}

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: >-
      ${{ github.event.pull_request.merged == true
      && startsWith(github.event.pull_request.title, 'chore(release): ') }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Check out the PR base commit (main as it was before this PR merged),
          # not the merge result. The privileged release-finalize script is
          # imported from the workspace, so pinning to the base SHA guarantees it
          # is the trusted version already on main and cannot be something the
          # merged release PR introduced. fetch-depth: 0 still fetches all tags.
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0
          persist-credentials: false

      # Parse the version from the release PR title and verify the matching
      # release-prep branch plus latest published RC before publishing anything.
      - name: Resolve release version and commit
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          version="${TITLE#chore(release): }"
          version="$(printf '%s' "${version}" | tr -d '[:space:]')"
          if ! printf '%s' "${version}" | grep -qE '^v?[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::PR title does not contain a valid release version: ${TITLE}"
            exit 1
          fi
          expected_head="release-prep/${version}"
          if [ "${HEAD_REF}" != "${expected_head}" ]; then
            echo "::error::Release PR must come from ${expected_head}; got ${HEAD_REF}."
            exit 1
          fi
          if [ "${HEAD_REPO}" != "${GITHUB_REPOSITORY}" ]; then
            echo "::error::Release PR must come from ${GITHUB_REPOSITORY}; got ${HEAD_REPO}."
            exit 1
          fi
          branch_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/prerelease/${version}" --jq '.object.sha' 2>/dev/null || true)"
          if [ -z "${branch_sha}" ]; then
            echo "::error::No release candidate branch prerelease/${version}; cannot publish."
            exit 1
          fi
          last_n="$(git tag --list "${version}-rc.*" | sed 's/.*-rc\.//' | grep -E '^[0-9]+$' | sort -n | tail -n1 || true)"
          if [ -z "${last_n}" ]; then
            echo "::error::No published release candidate tag for ${version}; cannot publish."
            exit 1
          fi
          rc_tag="${version}-rc.${last_n}"
          rc_sha="$(git rev-list -n 1 "${rc_tag}")"
          if [ "${branch_sha}" != "${rc_sha}" ]; then
            echo "::error::prerelease/${version} points at ${branch_sha}, but latest published RC ${rc_tag} points at ${rc_sha}. Publish the current draft RC before publishing the final release."
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "sha=${branch_sha}" >> "$GITHUB_OUTPUT"
          echo "rc_tag=${rc_tag}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${version} from ${rc_tag} at ${branch_sha}"

      - name: Write release notes
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: printf '%s' "${BODY}" > release-notes.md

      # The last RC commit documents the RC tag (vX.Y.Z-rc.N) in its README. Append
      # a verified commit that re-pins only the README to the final vX.Y.Z, so the
      # tag created below advertises its own version. dist/ stays byte-identical.
      - name: Re-pin README to release version
        id: finalize
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { default: script } = await import(`${process.env.GITHUB_WORKSPACE}/.github/scripts/release-finalize.mjs`)
            await script({ context, github, core })
        env:
          INPUT_VERSION: ${{ steps.resolve.outputs.version }}
          INPUT_BRANCH: prerelease/${{ steps.resolve.outputs.version }}

      # Create the immutable final release/tag at the re-pinned commit and mark it
      # latest. --target pins the new tag to that exact commit.
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.resolve.outputs.version }}
          TARGET: ${{ steps.finalize.outputs.sha }}
        run: |
          gh release create "${VERSION}" \
            --target "${TARGET}" \
            --title "${VERSION}" \
            --notes-file release-notes.md \
            --latest

      - name: Remove Release Branches
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/prerelease/${VERSION}" --silent || true
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/release-prep/${VERSION}" --silent || true
